- text: "J'aime les nuages... les nuages qui passent... la-bas... les merveilleux nuages !"
  source: Charles Baudelaire
  work: L'Etranger
  year: 1869
- text: "There is only one law in emotion: to bring happiness to those we love."
  source: Stendhal
  work: Diary entry
  year: 1805
- text: "Everything that comes from weakness."
  source: Friedrich Nietzsche
  work: The Antichrist
  year: 1888
